version: "3.7"

services:
  # 🟦 Banco de metadados do Metabase
  metabase-db:
    image: postgres:13-alpine
    container_name: metabase_db
    restart: always
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 5s
      timeout: 3s
      retries: 20

  # 🟩 Metabase Server
  metabase:
    image: metabase/metabase:v0.49.8
    container_name: metabase
    restart: always
    depends_on:
      metabase-db:
        condition: service_healthy
    ports:
      - "5544:5544"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase-db
      MB_SITE_URL: http://localhost:5544
      MB_JETTY_HOST: 0.0.0.0
      MB_JETTY_PORT: 5544
    volumes:
      - metabase_plugins:/plugins

volumes:
  metabase_db_data:
  metabase_plugins:
